name: Fetch ShelterLuv Dogs

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch all dogs from ShelterLuv
        env:
          API_KEY: ${{ secrets.SHELTERLUV_API_KEY }}
        run: |
          mkdir -p data
          echo '{"animals":[],"updated":"'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"}' > data/dogs.json
          
          OFFSET=0
          LIMIT=100
          ALL_ANIMALS="[]"
          
          while true; do
            RESPONSE=$(curl -s -H "Authorization: Bearer $API_KEY" \
              "https://new.shelterluv.com/api/v1/animals?status_type=in%20custody&limit=$LIMIT&offset=$OFFSET")
            
            ANIMALS=$(echo "$RESPONSE" | jq '.animals // []')
            HAS_MORE=$(echo "$RESPONSE" | jq -r '.has_more // false')
            
            ALL_ANIMALS=$(echo "$ALL_ANIMALS $ANIMALS" | jq -s 'add')
            
            if [ "$HAS_MORE" != "true" ]; then
              break
            fi
            
            OFFSET=$((OFFSET + LIMIT))
            sleep 1
          done
          
          DOGS=$(echo "$ALL_ANIMALS" | jq '[.[] | select(.Type == "Dog")]')
          COUNT=$(echo "$DOGS" | jq 'length')
          UPDATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          echo "{\"updated\":\"$UPDATED\",\"count\":$COUNT,\"animals\":$DOGS}" | jq '.' > data/dogs.json
          
          echo "Fetched $COUNT dogs"
      
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dogs.json
          git diff --staged --quiet || git commit -m "Update dog data"
          git push
