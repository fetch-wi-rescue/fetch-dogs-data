name: Fetch ShelterLuv Dogs

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch all dogs from ShelterLuv
        env:
          API_KEY: ${{ secrets.SHELTERLUV_API_KEY }}
        run: |
          mkdir -p data
          
          OFFSET=0
          LIMIT=100
          ALL_ANIMALS="[]"
          
          while true; do
            RESPONSE=$(curl -s -H "Authorization: Bearer $API_KEY" \
              "https://new.shelterluv.com/api/v1/animals?status_type=in%20custody&limit=$LIMIT&offset=$OFFSET")

            # Validate response is JSON before parsing
            if ! echo "$RESPONSE" | jq empty 2>/dev/null; then
              echo "ERROR: ShelterLuv API returned non-JSON response:"
              echo "$RESPONSE" | head -c 500
              echo ""
              echo "Exiting to prevent corrupt data."
              exit 5
            fi

            ANIMALS=$(echo "$RESPONSE" | jq '.animals // []')
            HAS_MORE=$(echo "$RESPONSE" | jq -r '.has_more // false')
            
            ALL_ANIMALS=$(echo "$ALL_ANIMALS $ANIMALS" | jq -s 'add')
            
            if [ "$HAS_MORE" != "true" ]; then
              break
            fi
            
            OFFSET=$((OFFSET + LIMIT))
            sleep 1
          done
          
          # Filter to dogs only, AND strip sensitive fields
          DOGS=$(echo "$ALL_ANIMALS" | jq '[.[] | select(.Type == "Dog") | del(.AssociatedPerson, .Microchips, .PreviousIds)]')
          COUNT=$(echo "$DOGS" | jq 'length')
          UPDATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          echo "{\"updated\":\"$UPDATED\",\"count\":$COUNT,\"animals\":$DOGS}" | jq '.' > data/dogs-current.json
          
          echo "Fetched $COUNT dogs"
      
      - name: Detect disappeared dogs and update archive
        run: |
          if [ -f data/dogs.json ]; then
            PREV_IDS=$(jq -r '.animals[].ID' data/dogs.json | sort)
            CURR_IDS=$(jq -r '.animals[].ID' data/dogs-current.json | sort)
            
            DISAPPEARED_IDS=$(comm -23 <(echo "$PREV_IDS") <(echo "$CURR_IDS"))
            
            if [ -n "$DISAPPEARED_IDS" ]; then
              echo "Found disappeared dogs:"
              echo "$DISAPPEARED_IDS"
              
              if [ ! -f data/archived-pending-review.json ]; then
                echo '{"updated":"","animals":[]}' > data/archived-pending-review.json
              fi
              
              while IFS= read -r DOG_ID; do
                if [ -z "$DOG_ID" ]; then continue; fi
                
                ALREADY_ARCHIVED=$(jq --arg id "$DOG_ID" '.animals | map(select(.ID == $id)) | length' data/archived-pending-review.json)
                if [ "$ALREADY_ARCHIVED" -gt 0 ]; then
                  echo "Dog $DOG_ID already in archive, skipping"
                  continue
                fi
                
                # Get the dog's last-known data and SLIM IT DOWN to only essentials
                DOG_DATA=$(jq --arg id "$DOG_ID" '
                  .animals[] | select(.ID == $id) | {
                    ID,
                    Name,
                    CoverPhoto,
                    Status
                  }
                ' data/dogs.json)
                LAST_STATUS=$(echo "$DOG_DATA" | jq -r '.Status')
                
                case "$LAST_STATUS" in
                  "Available"|"M&G"|"Boarding"|"Pending Adoption"|"Foster to Adopt")
                    REASON="likely_adopted"
                    ;;
                  "Hospice")
                    REASON="hospice_passed"
                    ;;
                  *)
                    REASON="other"
                    ;;
                esac
                
                DISAPPEARED_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                
                ENRICHED=$(echo "$DOG_DATA" | jq \
                  --arg reason "$REASON" \
                  --arg date "$DISAPPEARED_DATE" \
                  '. + {reason: $reason, disappearedDate: $date, status: "pending"}')
                
                jq --argjson dog "$ENRICHED" '.animals += [$dog]' data/archived-pending-review.json > data/archived-pending-review.tmp.json
                mv data/archived-pending-review.tmp.json data/archived-pending-review.json
                
                echo "Archived $DOG_ID (last status: $LAST_STATUS, reason: $REASON)"
              done <<< "$DISAPPEARED_IDS"
              
              UPDATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              jq --arg updated "$UPDATED" '.updated = $updated' data/archived-pending-review.json > data/archived-pending-review.tmp.json
              mv data/archived-pending-review.tmp.json data/archived-pending-review.json
            else
              echo "No disappeared dogs"
            fi
            
            if [ -f data/archived-pending-review.json ]; then
              CURRENT_IDS=$(jq -r '.animals[].ID' data/dogs-current.json | sort -u)
              CURRENT_IDS_JSON=$(echo "$CURRENT_IDS" | jq -R . | jq -s .)
              
              jq --argjson currentIds "$CURRENT_IDS_JSON" \
                '.animals |= map(select(.ID as $id | $currentIds | index($id) | not))' \
                data/archived-pending-review.json > data/archived-pending-review.tmp.json
              mv data/archived-pending-review.tmp.json data/archived-pending-review.json
            fi
          fi
          
          mv data/dogs-current.json data/dogs.json
      
      - name: Slim down existing archive entries
        run: |
          # One-time cleanup: slim down existing archived entries to only essential fields
          if [ -f data/archived-pending-review.json ]; then
            jq '.animals |= map({
              ID,
              Name,
              CoverPhoto,
              Status,
              reason,
              disappearedDate,
              status
            })' data/archived-pending-review.json > data/archived-pending-review.tmp.json
            mv data/archived-pending-review.tmp.json data/archived-pending-review.json
          fi
      
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dogs.json data/archived-pending-review.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "Update dog data and archive"
            # Retry push with pull-rebase in case another run committed in parallel
            for i in 1 2 3; do
              if git push; then
                exit 0
              fi
              echo "Push failed, pulling and retrying (attempt $i)..."
              git pull --rebase origin main
            done
            echo "Push failed after 3 retries"
            exit 1
          fi
